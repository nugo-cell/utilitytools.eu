<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#141828"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#7c5cff"/>
      <stop offset="55%" stop-color="#ff5e9c"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="120" cy="120" r="240" fill="#7c5cff" opacity="0.20"/>
  <circle cx="1100" cy="80" r="220" fill="#00d4aa" opacity="0.16"/>
  <circle cx="600" cy="660" r="280" fill="#ff5e9c" opacity="0.14"/>

  <g transform="translate(80,160)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
    <rect x="0" y="0" width="120" height="120" rx="26" fill="url(#brand)"/>
    <text x="60" y="92" text-anchor="middle" font-size="80" font-weight="800" fill="#fff">U</text>

    <text x="160" y="60" font-size="44" font-weight="800" fill="#f0f2fa">UtilityTools</text>
    <text x="160" y="105" font-size="28" font-weight="500" fill="#8a93b5">.eu — free EU online tools</text>

    <text x="0"   y="220" font-size="56" font-weight="800" fill="#f0f2fa">70+ free, privacy-first</text>
    <text x="0"   y="285" font-size="56" font-weight="800" fill="url(#brand)">browser tools.</text>
    <text x="0"   y="345" font-size="26" font-weight="500" fill="#8a93b5">JSON · Passwords · CV · PDF · Images · Encryption</text>

    <g transform="translate(0,400)" font-size="20" fill="#8a93b5">
      <text x="0" y="0">🇪🇺  Made in the EU</text>
      <text x="220" y="0">·  Zero tracking</text>
      <text x="430" y="0">·  No signup</text>
      <text x="600" y="0">·  Runs in your browser</text>
    </g>
