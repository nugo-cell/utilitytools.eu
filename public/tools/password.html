<body>
  <nav class="topnav">
    <div class="brand">Utility<span>Tools</span></div>
    <a class="back" href="/">← All tools</a>
  </nav>

  <div class="container">
    <div class="tool-header">
      <h1>Password Generator</h1>
      <p>Random, cryptographically-secure passwords. Configure length and character sets.</p>
    </div>

    <div class="panel">
      <div class="row" style="margin-bottom:12px">
        <label style="display:inline;margin-right:6px">Length:</label>
        <input type="number" id="length" value="20" min="4" max="128" style="width:100px">
        <label style="display:inline;margin-left:12px;margin-right:6px">Count:</label>
        <input type="number" id="count" value="5" min="1" max="100" style="width:100px">
      </div>
      <div class="row" style="margin-bottom:12px">
        <label class="checkbox"><input type="checkbox" id="lower" checked> Lowercase (a-z)</label>
        <label class="checkbox"><input type="checkbox" id="upper" checked> Uppercase (A-Z)</label>
        <label class="checkbox"><input type="checkbox" id="digits" checked> Digits (0-9)</label>
        <label class="checkbox"><input type="checkbox" id="symbols" checked> Symbols (!@#$…)</label>
        <label class="checkbox"><input type="checkbox" id="avoidAmbig"> Avoid ambiguous (O0Il1|)</label>
      </div>
      <div class="row" style="margin-bottom:12px">
        <button id="genBtn">Generate</button>
        <button id="copyBtn" class="secondary">Copy all</button>
        <button id="clearBtn" class="secondary">Clear</button>
      </div>

      <label for="output">Passwords</label>
      <textarea id="output" readonly style="min-height:180px"></textarea>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    const output = document.getElementById('output');
    const status = document.getElementById('status');

    function setStatus(msg, ok) {
      status.textContent = msg;
      status.className = 'status ' + (ok ? 'ok' : 'err');
    }

    const SETS = {
      lower:   'abcdefghijklmnopqrstuvwxyz',
      upper:   'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      digits:  '0123456789',
      symbols: '!@#$%^&*()-_=+[]{};:,.<>/?'
    };
    const AMBIG = /[O0Il1|]/g;

    function randInt(max) {
      // Secure integer in [0, max)
      const u = new Uint32Array(1);
      crypto.getRandomValues(u);
      return u[0] % max;
    }

    function generatePassword(len, pool) {
      let out = '';
      for (let i = 0; i < len; i++) out += pool[randInt(pool.length)];
      return out;
    }

    document.getElementById('genBtn').onclick = () => {
      let pool = '';
      if (document.getElementById('lower').checked)   pool += SETS.lower;
      if (document.getElementById('upper').checked)   pool += SETS.upper;
      if (document.getElementById('digits').checked)  pool += SETS.digits;
      if (document.getElementById('symbols').checked) pool += SETS.symbols;
      if (document.getElementById('avoidAmbig').checked) pool = pool.replace(AMBIG, '');

      if (!pool) { setStatus('Select at least one character set', false); return; }

      const len = Math.min(128, Math.max(4, parseInt(document.getElementById('length').value, 10) || 20));
      const count = Math.min(100, Math.max(1, parseInt(document.getElementById('count').value, 10) || 1));
      const lines = [];
      for (let i = 0; i < count; i++) lines.push(generatePassword(len, pool));
      output.value = lines.join('\n');
      setStatus(`Generated ${count} password${count>1?'s':''} ✓`, true);
    };

    document.getElementById('copyBtn').onclick = async () => {
      if (!output.value) { setStatus('Nothing to copy', false); return; }
      try { await navigator.clipboard.writeText(output.value); setStatus('Copied ✓', true); }
      catch { setStatus('Copy failed', false); }
    };

    document.getElementById('clearBtn').onclick = () => {
      output.value = ''; setStatus('', true);
    };

    document.getElementById('genBtn').click();
  </script>
  <script src="/site.js"></script>
</body>
</html>
