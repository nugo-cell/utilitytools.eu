<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UUID Generator — Free Online Tool · Utility Tools</title>
  <meta name="description" content="Generate cryptographically-random v4 UUIDs, single or in bulk. Free and private.">
  <meta name="keywords" content="uuid generator, uuid v4, random id generator, guid">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="/uuid">
  <meta property="og:type" content="website">
  <meta property="og:title" content="UUID Generator — Utility Tools">
  <meta property="og:description" content="Generate cryptographically-random v4 UUIDs, single or in bulk. Free and private.">
  <meta property="og:url" content="/uuid">
  <meta name="twitter:card" content="summary">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <nav class="topnav">
    <div class="brand">Utility<span>Tools</span></div>
    <a class="back" href="/">← All tools</a>
  </nav>

  <div class="container">
    <div class="tool-header">
      <h1>UUID Generator</h1>
      <p>Generates cryptographically-random v4 UUIDs.</p>
    </div>

    <div class="panel">
      <div class="row" style="margin-bottom:12px">
        <label for="count" style="display:inline;margin-right:6px">Count:</label>
        <input type="number" id="count" value="1" min="1" max="1000" style="width:100px">
        <label class="checkbox">
          <input type="checkbox" id="upper"> Uppercase
        </label>
        <label class="checkbox">
          <input type="checkbox" id="noHyphens"> No hyphens
        </label>
        <button id="genBtn">Generate</button>
        <button id="copyBtn" class="secondary">Copy all</button>
        <button id="clearBtn" class="secondary">Clear</button>
      </div>

      <label for="output">Output</label>
      <textarea id="output" readonly style="min-height:240px"></textarea>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    const output = document.getElementById('output');
    const status = document.getElementById('status');

    function setStatus(msg, ok) {
      status.textContent = msg;
      status.className = 'status ' + (ok ? 'ok' : 'err');
    }

    function uuidv4() {
      if (crypto.randomUUID) return crypto.randomUUID();
      // Fallback
      const b = new Uint8Array(16);
      crypto.getRandomValues(b);
      b[6] = (b[6] & 0x0f) | 0x40;
      b[8] = (b[8] & 0x3f) | 0x80;
      const h = [...b].map(x => x.toString(16).padStart(2, '0'));
      return `${h.slice(0,4).join('')}-${h.slice(4,6).join('')}-${h.slice(6,8).join('')}-${h.slice(8,10).join('')}-${h.slice(10,16).join('')}`;
    }

    document.getElementById('genBtn').onclick = () => {
      const n = Math.min(1000, Math.max(1, parseInt(document.getElementById('count').value, 10) || 1));
      const upper = document.getElementById('upper').checked;
      const noHyphens = document.getElementById('noHyphens').checked;
      const list = [];
      for (let i = 0; i < n; i++) {
        let id = uuidv4();
        if (noHyphens) id = id.replace(/-/g, '');
        if (upper) id = id.toUpperCase();
        list.push(id);
      }
      output.value = list.join('\n');
      setStatus(`Generated ${n} UUID${n>1?'s':''} ✓`, true);
    };

    document.getElementById('copyBtn').onclick = async () => {
      if (!output.value) { setStatus('Nothing to copy', false); return; }
      try { await navigator.clipboard.writeText(output.value); setStatus('Copied ✓', true); }
      catch { setStatus('Copy failed', false); }
    };

    document.getElementById('clearBtn').onclick = () => {
      output.value = ''; setStatus('', true);
    };

    // Generate one on page load
    document.getElementById('genBtn').click();
  </script>
  <script src="/site.js"></script>
</body>
</html>
