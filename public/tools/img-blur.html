<body>
  <header class="topnav">
    <a href="/" class="brand">Utility<span>Tools</span></a>
    <nav><a href="/">Tools</a><a href="/blog">Blog</a><a href="/about">About</a></nav>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>Blur / Pixelate Tool</h1>
      <p>Drag a rectangle on the image to blur or pixelate it. Useful for hiding faces, names and other private info.</p>
    </div>

    <div class="panel">
      <label class="img-drop" id="drop">
        <input type="file" id="file" accept="image/*">
        <div><b>Click or drop</b> an image</div>
      </label>
    </div>

    <div class="panel" id="work" hidden>
      <div class="img-toolbar">
        <div class="group" id="modeGroup">
          <button data-m="blur" class="active">Blur</button>
          <button data-m="pixel">Pixelate</button>
        </div>
        <div style="display:inline-flex;align-items:center;gap:6px">
          <label style="margin:0">Strength</label>
          <input type="range" id="str" min="2" max="40" value="14" style="width:120px">
          <span id="strV" class="mono" style="font-size:13px;min-width:30px">14</span>
        </div>
        <button id="undo" class="secondary">Undo</button>
        <button id="dlBtn">Download</button>
      </div>
      <div id="status" class="status">Drag a rectangle on the image to blur/pixelate that area.</div>
      <div class="img-stage"><canvas id="cv" style="cursor:crosshair"></canvas></div>
    </div>
  </main>

  <script>
    const drop=document.getElementById('drop'), file=document.getElementById('file'), work=document.getElementById('work');
    const cv=document.getElementById('cv'), str=document.getElementById('str'), strV=document.getElementById('strV');
    const ctx=cv.getContext('2d'), status=document.getElementById('status');
    let img=null, srcName='image', mode='blur', history=[], drawing=false, sx=0, sy=0;
    str.oninput=()=>strV.textContent=str.value;

    document.getElementById('modeGroup').addEventListener('click',e=>{
      const b=e.target.closest('button'); if(!b) return;
      [...e.currentTarget.children].forEach(c=>c.classList.remove('active'));
      b.classList.add('active'); mode=b.dataset.m;
    });
    ['dragover','dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.toggle('drag',ev==='dragover');}));
    drop.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f)load(f);});
    file.onchange=e=>{const f=e.target.files[0];if(f)load(f);};

    function load(f){
      if(!f.type.startsWith('image/')){status.textContent='Pick an image';status.className='status err';return;}
      srcName=f.name.replace(/\.[^.]+$/,'')||'image';
      const im=new Image(); im.onload=()=>{
        img=im; cv.width=im.naturalWidth; cv.height=im.naturalHeight;
        ctx.drawImage(im,0,0); history=[]; pushSnap();
        work.hidden=false;
        status.textContent='Drag a rectangle to blur/pixelate.'; status.className='status ok';
      }; im.src=URL.createObjectURL(f);
    }
    function pushSnap(){ history.push(ctx.getImageData(0,0,cv.width,cv.height)); if(history.length>20) history.shift(); }
    function pos(e){ const r=cv.getBoundingClientRect(); const p=e.touches?e.touches[0]:e; return {x:(p.clientX-r.left)*(cv.width/r.width), y:(p.clientY-r.top)*(cv.height/r.height)}; }

    cv.addEventListener('mousedown',start); cv.addEventListener('touchstart',e=>{e.preventDefault();start(e);},{passive:false});
    function start(e){ if(!img) return; const p=pos(e); sx=p.x; sy=p.y; drawing=true; window.addEventListener('mousemove',move); window.addEventListener('mouseup',end); window.addEventListener('touchmove',move,{passive:false}); window.addEventListener('touchend',end); }
    function move(e){
      if(!drawing) return; e.preventDefault?.();
      const p=pos(e);
      // redraw last snapshot then draw selection rect
      ctx.putImageData(history[history.length-1],0,0);
      ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.setLineDash([6,4]);
      ctx.strokeRect(Math.min(sx,p.x), Math.min(sy,p.y), Math.abs(p.x-sx), Math.abs(p.y-sy));
      ctx.setLineDash([]);
    }
    function end(e){
      if(!drawing) return; drawing=false;
      window.removeEventListener('mousemove',move); window.removeEventListener('mouseup',end); window.removeEventListener('touchmove',move); window.removeEventListener('touchend',end);
      const p=pos(e.changedTouches?{clientX:e.changedTouches[0].clientX,clientY:e.changedTouches[0].clientY}:e);
      const x=Math.min(sx,p.x), y=Math.min(sy,p.y), w=Math.abs(p.x-sx), h=Math.abs(p.y-sy);
      ctx.putImageData(history[history.length-1],0,0);
      if(w<3||h<3) return;
      apply(x,y,w,h);
      pushSnap();
    }
    function apply(x,y,w,h){
      x=Math.round(x); y=Math.round(y); w=Math.round(w); h=Math.round(h);
      const s=+str.value;
      if(mode==='pixel'){
        const block=Math.max(2,s);
        // Sample by drawing region small then back
        const tmp=document.createElement('canvas'); tmp.width=Math.max(1,Math.floor(w/block)); tmp.height=Math.max(1,Math.floor(h/block));
        const tctx=tmp.getContext('2d'); tctx.imageSmoothingEnabled=false;
        tctx.drawImage(cv,x,y,w,h,0,0,tmp.width,tmp.height);
        ctx.imageSmoothingEnabled=false;
        ctx.drawImage(tmp,0,0,tmp.width,tmp.height,x,y,w,h);
        ctx.imageSmoothingEnabled=true;
      } else {
        // Blur via canvas filter on a temporary canvas
        const tmp=document.createElement('canvas'); tmp.width=w; tmp.height=h;
        const tctx=tmp.getContext('2d');
        tctx.filter='blur('+s+'px)';
        tctx.drawImage(cv,x,y,w,h,0,0,w,h);
        ctx.drawImage(tmp,x,y);
      }
    }
    document.getElementById('undo').onclick=()=>{
      if(history.length>1){ history.pop(); ctx.putImageData(history[history.length-1],0,0); }
    };
    document.getElementById('dlBtn').onclick=()=>cv.toBlob(b=>{
      const url=URL.createObjectURL(b);
      const a=document.createElement('a'); a.href=url; a.download=srcName+'-redacted.png';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),1000);
    },'image/png');
  </script>
  <script src="/site.js"></script>
</body>
