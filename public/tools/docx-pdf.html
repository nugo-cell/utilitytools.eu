<body>
  <header class="topnav">
    <a href="/" class="brand">Utility<span>Tools</span></a>
    <nav><a href="/" class="active">Tools</a><a href="/blog">Blog</a><a href="/about">About</a></nav>

  <main class="container">
    <div class="tool-header">
      <h1>DOCX to PDF Converter</h1>
      <p>Drop a Word document (.docx), preview it, and save it as PDF using your browser's print dialog. Files never leave your device.</p>
    </div>

    <div class="panel no-print">
      <div id="dropzone" class="dropzone">
        <div><strong>Drop a .docx file here</strong> or click to choose</div>
        <input type="file" id="file" accept=".docx" hidden>
      </div>
      <div class="row" style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap; align-items:center">
        <button id="downloadBtn" disabled>💾 Download PDF</button>
        <button id="printBtn" class="secondary" disabled>Print / Save via browser</button>
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)">
          Page size
          <select id="pageSize">
            <option value="a4" selected>A4</option>
            <option value="letter">Letter</option>
            <option value="legal">Legal</option>
          </select>
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)">
          Orientation
          <select id="orientation">
            <option value="portrait" selected>Portrait</option>
            <option value="landscape">Landscape</option>
          </select>
        </label>
        <span id="fileInfo" style="color:var(--muted);font-size:13px"></span>
      </div>
      <div id="status" class="status"></div>
    </div>

    <div class="panel" id="previewPanel" style="display:none">
      <div class="docx-preview" id="preview"></div>
    </div>
  </main>

  <script>
    const dz = document.getElementById('dropzone');
    const fileInput = document.getElementById('file');
    const preview = document.getElementById('preview');
    const printBtn = document.getElementById('printBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const info = document.getElementById('fileInfo');
    const status = document.getElementById('status');
    const previewPanel = document.getElementById('previewPanel');
    let lastFileName = '';

    function setStatus(m, ok) { status.textContent = m; status.className = 'status ' + (ok ? 'ok' : 'err'); }

    function handleFile(file) {
      if (!file) return;
      if (!/\.docx$/i.test(file.name)) { setStatus('Please drop a .docx file', false); return; }
      lastFileName = file.name;
      info.textContent = file.name + ' · ' + Math.round(file.size / 1024) + ' KB';
      const reader = new FileReader();
      reader.onload = e => {
        mammoth.convertToHtml({ arrayBuffer: e.target.result })
          .then(result => {
            preview.innerHTML = result.value || '<em>(document appears empty)</em>';
            previewPanel.style.display = 'block';
            printBtn.disabled = false;
            downloadBtn.disabled = false;
            setStatus(result.messages.length ? `Converted with ${result.messages.length} notes ✓` : 'Converted ✓', true);
          })
          .catch(err => setStatus('Conversion failed: ' + err.message, false));
      };
      reader.readAsArrayBuffer(file);
    }

    dz.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
    ['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, e => {
      e.preventDefault(); e.stopPropagation(); dz.classList.add('drag');
    }));
    ['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => {
      e.preventDefault(); e.stopPropagation(); dz.classList.remove('drag');
    }));
    dz.addEventListener('drop', e => handleFile(e.dataTransfer.files[0]));

    printBtn.onclick = () => window.print();

    downloadBtn.onclick = async () => {
      if (!preview.innerHTML.trim()) return;
      downloadBtn.disabled = true;
      setStatus('Generating PDF…', true);
      try {
        const filename = (lastFileName || 'document').replace(/\.docx$/i, '') + '.pdf';
        await html2pdf().from(preview).set({
          margin: [12, 12, 12, 12],
          filename,
          image: { type: 'jpeg', quality: 0.95 },
          html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
          jsPDF: {
            unit: 'mm',
            format: document.getElementById('pageSize').value,
            orientation: document.getElementById('orientation').value
          },
          pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
        }).save();
        setStatus('PDF saved ✓', true);
      } catch (err) {
        setStatus('PDF generation failed: ' + err.message, false);
      } finally {
        downloadBtn.disabled = false;
      }
    };
  </script>
  <script src="/site.js"></script>
